<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВДОХ - Обратная связь</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F0EB;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #8B1A1A 0%, #6B1414 50%, #4A0E0E 100%);
            color: #fff;
            padding: 48px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 200px; height: 200px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30px; left: -30px;
            width: 150px; height: 150px;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .hero-logo {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 8px;
            position: relative;
        }
        .hero-subtitle {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.85;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .hero-desc {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.95;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }
        .ornament {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .ornament span {
            width: 6px; height: 6px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }
        .ornament span:nth-child(2) {
            width: 24px;
            border-radius: 3px;
            background: rgba(255,255,255,0.6);
        }
        .form-section {
            max-width: 720px;
            margin: -20px auto 40px;
            padding: 0 16px;
            position: relative;
            z-index: 2;
        }
        .form-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-card iframe {
            width: 100%;
            min-height: 1200px;
            border: none;
            display: block;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: #8B1A1A;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
        }
        .footer a {
            color: #8B1A1A;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .hero { padding: 32px 16px 28px; }
            .hero-logo { font-size: 40px; letter-spacing: 8px; }
            .hero-desc { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-logo">ВДОХ</div>
        <div class="hero-subtitle">фестиваль сообществ</div>
        <div class="hero-desc">Мы ценим ваше мнение! Помогите нам сделать следующий фестиваль ещё лучше.</div>
        <div class="ornament">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="form-section">
        <div class="form-card">
            <iframe src="https://forms.yandex.ru/cloud/69e76d6b6d2d73423e08733d/?iframe=1" frameborder="0"></iframe>
        </div>
    </div>
    <div class="footer">
        ВДОХ &copy; 2026 | <a href="https://vdohfest.ru" target="_blank">vdohfest.ru</a>
    </div>
</body>
</html>
